<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --card-back: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #ff6b6b;
    --accent3: #47c5ff;
    --text: #f0f0f5;
    --muted: #555570;
    --glow: rgba(232, 255, 71, 0.25);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 40%, rgba(232,255,71,0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 80%, rgba(71,197,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 7vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 40px var(--glow);
  }

  h1 span {
    color: var(--text);
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 24px;
  }

  .stat {
    text-align: center;
  }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
    transition: transform 0.2s;
  }

  .stat-value.bump {
    animation: bump 0.3s ease;
  }

  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .difficulty {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .diff-btn {
    background: var(--surface);
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .diff-btn:hover { border-color: var(--text); color: var(--text); }
  .diff-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
    font-weight: 500;
  }

  .grid {
    display: grid;
    gap: 10px;
    margin-bottom: 24px;
  }

  .grid.g4 { grid-template-columns: repeat(4, 1fr); }
  .grid.g6 { grid-template-columns: repeat(6, 1fr); }

  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 4vw, 2rem);
  }

  .card-back {
    background: var(--card-back);
    border: 1px solid #2a2a3e;
    transition: border-color 0.2s;
  }

  .card-back::after {
    content: '?';
    font-family: 'Syne', sans-serif;
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 800;
    color: #2a2a3e;
  }

  .card:hover:not(.flipped):not(.matched) .card-back {
    border-color: var(--accent);
  }

  .card-front {
    background: var(--surface);
    border: 1px solid #2a2a3e;
    transform: rotateY(180deg);
  }

  .card.matched .card-front {
    border-color: var(--accent);
    background: #1a1f10;
    box-shadow: 0 0 20px rgba(232, 255, 71, 0.2);
    animation: matchPop 0.4s ease;
  }

  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card.wrong .card-inner {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }

  .controls {
    display: flex;
    justify-content: center;
  }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: var(--accent);
    color: #0a0a0f;
    box-shadow: 0 0 30px var(--glow);
  }

  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .win-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .win-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 10vw, 5rem);
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 0 60px var(--glow);
    margin-bottom: 8px;
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 40px var(--glow); }
    50% { text-shadow: 0 0 80px rgba(232,255,71,0.5); }
  }

  .win-sub {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .win-stats {
    display: flex;
    gap: 40px;
    margin-bottom: 32px;
  }

  .win-stat { text-align: center; }
  .win-stat-label { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .win-stat-value { font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 700; color: var(--text); }

  .win-btn {
    background: var(--accent);
    border: none;
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 40px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 40px var(--glow);
  }

  .win-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <h1>MEM<span>ORY</span></h1>
    <p class="subtitle">Flip &amp; Match</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pairs</div>
      <div class="stat-value" id="pairs">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
  </div>

  <div class="difficulty">
    <button class="diff-btn active" data-diff="easy">Easy</button>
    <button class="diff-btn" data-diff="medium">Medium</button>
    <button class="diff-btn" data-diff="hard">Hard</button>
  </div>

  <div class="grid g4" id="grid"></div>

  <div class="controls">
    <button class="restart-btn" id="restart">↺ Restart</button>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-title">YOU WIN!</div>
  <div class="win-sub">All pairs matched</div>
  <div class="win-stats">
    <div class="win-stat">
      <div class="win-stat-label">Moves</div>
      <div class="win-stat-value" id="winMoves">—</div>
    </div>
    <div class="win-stat">
      <div class="win-stat-label">Time</div>
      <div class="win-stat-value" id="winTime">—</div>
    </div>
  </div>
  <button class="win-btn" id="winRestart">Play Again</button>
</div>

<script>
  const EMOJIS = ['🦊','🐬','🦋','🌵','🎸','🍉','🚀','🎭','🦄','🌙','🔮','🎯','🦁','🐙','🌺','🍄','⚡','🎪'];

  const DIFFICULTIES = {
    easy:   { pairs: 8,  cols: 'g4' },
    medium: { pairs: 12, cols: 'g6' },
    hard:   { pairs: 18, cols: 'g6' },
  };

  let flipped = [], matched = 0, moves = 0, lock = false;
  let totalPairs = 8, timerInterval = null, seconds = 0, started = false;
  let currentDiff = 'easy';

  const grid = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const pairsEl = document.getElementById('pairs');
  const timerEl = document.getElementById('timer');
  const winOverlay = document.getElementById('winOverlay');

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function fmt(s) {
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      seconds++;
      timerEl.textContent = fmt(seconds);
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function bumpStat(el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  function initGame(diff = currentDiff) {
    currentDiff = diff;
    stopTimer();
    flipped = []; matched = 0; moves = 0; lock = false; seconds = 0; started = false;
    movesEl.textContent = '0';
    pairsEl.textContent = '0';
    timerEl.textContent = '0:00';
    winOverlay.classList.remove('show');

    const cfg = DIFFICULTIES[diff];
    totalPairs = cfg.pairs;
    grid.className = `grid ${cfg.cols}`;

    const emojis = shuffle([...EMOJIS]).slice(0, totalPairs);
    const cards = shuffle([...emojis, ...emojis]);

    grid.innerHTML = '';
    cards.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.emoji = emoji;
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        </div>`;
      card.addEventListener('click', () => onCardClick(card));
      grid.appendChild(card);
    });
  }

  function onCardClick(card) {
    if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
    if (!started) { started = true; startTimer(); }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      lock = true;
      moves++;
      movesEl.textContent = moves;
      bumpStat(movesEl);

      const [a, b] = flipped;
      if (a.dataset.emoji === b.dataset.emoji) {
        a.classList.add('matched');
        b.classList.add('matched');
        matched++;
        pairsEl.textContent = matched;
        bumpStat(pairsEl);
        flipped = [];
        lock = false;
        if (matched === totalPairs) {
          stopTimer();
          setTimeout(showWin, 500);
        }
      } else {
        a.classList.add('wrong');
        b.classList.add('wrong');
        setTimeout(() => {
          a.classList.remove('flipped', 'wrong');
          b.classList.remove('flipped', 'wrong');
          flipped = [];
          lock = false;
        }, 900);
      }
    }
  }

  function showWin() {
    document.getElementById('winMoves').textContent = moves;
    document.getElementById('winTime').textContent = fmt(seconds);
    winOverlay.classList.add('show');
  }

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      initGame(btn.dataset.diff);
    });
  });

  document.getElementById('restart').addEventListener('click', () => initGame(currentDiff));
  document.getElementById('winRestart').addEventListener('click', () => initGame(currentDiff));

  initGame();
</script>
</body>
</html>
